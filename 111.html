<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LogicLab Ultra | 專業電機實驗室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&family=Fira+Code:wght@400;500&display=swap');
        
        :root {
            --dark-bg: #0f172a;
            --panel-bg: #1e293b;
            --accent: #14b8a6;
            --grid-color: rgba(255, 255, 255, 0.03);
        }

        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background-color: var(--dark-bg); 
            color: #f8fafc; 
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes pulse-teal {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .animate-pulse-teal { animation: pulse-teal 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // ==========================================
        // 資料與常數定義
        // ==========================================
        const PARTS_DATA = [
            { name: "麵包板", en: "Breadboard", desc: "電路原型設計的基礎，無需焊接即可連接電子元件。內部以金屬夾條連接特定的孔洞。", usage: "快速搭建實驗電路、測試零件功能、教學演示。" },
            { name: "電阻器", en: "Resistor", desc: "根據歐姆定律 (V=IR) 消耗電能，主要功能是限制電流的大小。", usage: "保護 LED、調節信號電壓、分流、分壓。" },
            { name: "電容器", en: "Capacitor", desc: "由兩塊極板組成的儲能元件，具有通交流、隔直流的特性。", usage: "濾波、定時電路、儲能、穩壓。" },
            { name: "二極體", en: "Diode", desc: "具有 PN 接面的半導體，僅允許電流單向流動。", usage: "整流、電路保護、訊號檢波。" },
            { name: "電晶體", en: "Transistor", desc: "半導體三極管，是電子學最重要的發明，可作為放大器或開關。", usage: "數位運算開關、音頻放大、振盪器。" },
            { name: "電位器", en: "Potentiometer", desc: "可變電阻，透過旋鈕改變中間抽頭的電位。", usage: "音量調整、調光器、感測器基準設定。" },
            { name: "光敏電阻", en: "LDR", desc: "阻值隨環境光照強度增加而減小的電阻器。", usage: "路燈自動開關、光線偵測儀。" },
            { name: "熱敏電阻", en: "Thermistor", desc: "對溫度變化極為敏感的電阻器。", usage: "溫度計、過載保護、空調溫控。" },
            { name: "按鈕開關", en: "Push Button", desc: "機械式開關，按下時接通電路。", usage: "Reset 鍵、門鈴、觸發控制。" },
            { name: "指撥開關", en: "DIP Switch", desc: "封裝在單一外殼內的小型開關組。", usage: "硬體定址、功能模式切換。" },
            { name: "蜂鳴器", en: "Buzzer", desc: "將電能轉換為聲音訊號的元件。", usage: "報警、按鍵反饋音、提示音。" },
            { name: "保險絲", en: "Fuse", desc: "當電流超過設計限值時會熔斷的保護元件。", usage: "短路保護、防止火災。" },
            { name: "壓敏電阻", en: "Varistor", desc: "隨電壓升高而阻值驟降的防護元件。", usage: "突波吸收、防雷保護。" },
            { name: "邏輯閘 IC", en: "Logic Gates", desc: "包含多個邏輯閘的積體電路，如 74 系列或 4000 系列。", usage: "數位電路設計、布林代數實作。" },
            { name: "555 計時器", en: "555 Timer IC", desc: "經典的混合訊號 IC，能產生精確的時間延遲或方波。", usage: "脈衝調變 (PWM)、閃爍燈、定時任務。" }
        ];

        const GATE_DEFS = {
            AND: { func: (a, b) => a & b, desc: "AND 閘：全 1 為 1。只有當 A=1 且 B=1 時，輸出才為 1。" },
            OR: { func: (a, b) => a | b, desc: "OR 閘：有 1 即 1。只要 A=1 或 B=1，輸出即為 1。" },
            NOT: { func: (a) => a === 1 ? 0 : 1, desc: "NOT 閘：反向器。將輸入 1 變 0，0 變 1。" },
            XOR: { func: (a, b) => a ^ b, desc: "XOR 閘：異或。A、B 不同時（一個 1 一個 0）輸出為 1。" },
            NAND: { func: (a, b) => (a & b) === 1 ? 0 : 1, desc: "NAND 閘：與非。AND 的相反，只有全 1 時輸出為 0。" },
            NOR: { func: (a, b) => (a | b) === 1 ? 0 : 1, desc: "NOR 閘：或非。OR 的相反，只有全 0 時輸出為 1。" }
        };

        const LucideIcon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        // ==========================================
        // 主要框架
        // ==========================================
        const App = () => {
            const [view, setView] = useState('auth'); 
            const [user, setUser] = useState(null);

            useEffect(() => {
                const saved = localStorage.getItem('logiclab_ultra_user');
                if (saved) { setUser(JSON.parse(saved)); setView('lobby'); }
            }, []);

            const login = (data) => { setUser(data); localStorage.setItem('logiclab_ultra_user', JSON.stringify(data)); setView('lobby'); };
            const logout = () => { setUser(null); localStorage.removeItem('logiclab_ultra_user'); setView('auth'); };

            const handleNavigation = (id) => {
                if (id === 'external_canvas') {
                    window.open('https://anna970625anna-collab.github.io/anna970625anna/111.html', '_blank');
                } else {
                    setView(id);
                }
            };

            return (
                <div className="h-screen w-screen flex flex-col bg-slate-950 text-slate-50 overflow-hidden">
                    {view === 'auth' ? (
                        <AuthView onLogin={login} />
                    ) : (
                        <>
                            <header className="h-16 bg-slate-900/50 backdrop-blur-md border-b border-white/5 flex items-center justify-between px-6 z-50">
                                <div className="flex items-center gap-3">
                                    <div className="bg-teal-500 p-1.5 rounded-xl text-slate-950 shadow-lg shadow-teal-500/20"><LucideIcon name="cpu" size={20}/></div>
                                    <h1 className="text-lg font-black tracking-tighter uppercase">LogicLab <span className="text-teal-400">Ultra</span></h1>
                                </div>
                                <div className="flex items-center gap-4">
                                    <div className="text-right hidden sm:block">
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest leading-none">Status: Active</p>
                                        <p className="text-xs font-bold text-teal-400">{user?.username}</p>
                                    </div>
                                    <button onClick={logout} className="p-2.5 text-rose-400 hover:bg-rose-500/10 rounded-full transition-all"><LucideIcon name="log-out" size={18}/></button>
                                </div>
                            </header>
                            <main className="flex-1 relative overflow-hidden">
                                {view === 'lobby' && <LobbyView setView={handleNavigation} />}
                                {view === 'parts' && <PartsView onBack={() => setView('lobby')} user={user} />}
                                {view === 'challenge' && <ChallengeView onBack={() => setView('lobby')} />}
                                {view === 'sim' && <SimulatorView onBack={() => setView('lobby')} />}
                            </main>
                        </>
                    )}
                </div>
            );
        };

        const AuthView = ({ onLogin }) => {
            const [isLogin, setIsLogin] = useState(true);
            const [form, setForm] = useState({ username: '', email: '', password: '' });
            const [err, setErr] = useState('');
            const submit = (e) => {
                e.preventDefault();
                const db = JSON.parse(localStorage.getItem('logiclab_db') || '[]');
                if (isLogin) {
                    const u = db.find(x => x.email === form.email && x.password === form.password);
                    if (u) onLogin(u); else setErr('驗證失敗：帳號或密碼錯誤');
                } else {
                    if (!form.username || !form.email || !form.password) return setErr('所有欄位皆為必填');
                    db.push(form); localStorage.setItem('logiclab_db', JSON.stringify(db)); onLogin(form);
                }
            };
            return (
                <div className="h-full w-full flex items-center justify-center p-6 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-slate-900 to-slate-950">
                    <div className="w-full max-w-md bg-slate-900 p-10 rounded-[2.5rem] border border-white/5 text-center shadow-2xl relative overflow-hidden">
                        <div className="absolute -top-10 -right-10 w-40 h-40 bg-teal-500/10 rounded-full blur-3xl"></div>
                        <div className="inline-block p-5 bg-teal-500 rounded-3xl mb-6 text-slate-950 shadow-xl shadow-teal-500/20"><LucideIcon name="fingerprint" size={36} /></div>
                        <h2 className="text-2xl font-black mb-8 uppercase tracking-widest text-white">{isLogin ? '實驗室進入' : '建立實驗員檔'}</h2>
                        <form onSubmit={submit} className="space-y-4 text-left">
                            {!isLogin && <input className="w-full bg-slate-800 p-4 rounded-2xl outline-none border border-white/5 text-sm" placeholder="實驗員姓名" onChange={e => setForm({...form, username: e.target.value})} />}
                            <input className="w-full bg-slate-800 p-4 rounded-2xl outline-none border border-white/5 text-sm" type="email" placeholder="信箱地址" onChange={e => setForm({...form, email: e.target.value})} />
                            <input className="w-full bg-slate-800 p-4 rounded-2xl outline-none border border-white/5 text-sm" type="password" placeholder="安全密碼" onChange={e => setForm({...form, password: e.target.value})} />
                            {err && <p className="text-rose-400 text-xs font-bold text-center">{err}</p>}
                            <button className="w-full bg-teal-500 py-4 rounded-2xl text-slate-950 font-black uppercase text-sm shadow-lg shadow-teal-500/20 hover:bg-teal-400 transition-colors">Start Experiment</button>
                        </form>
                        <button onClick={() => setIsLogin(!isLogin)} className="mt-8 text-slate-500 text-[10px] font-black uppercase hover:text-teal-400 tracking-widest">{isLogin ? 'Register New Account' : 'Back to Login'}</button>
                    </div>
                </div>
            );
        };

        const LobbyView = ({ setView }) => {
            const menu = [
                { id: 'parts', title: '元件百科', icon: 'book-open', color: 'bg-indigo-500', desc: '探索電子元件的基本構造與實際應用。' },
                { id: 'challenge', title: '邏輯闖關', icon: 'swords', color: 'bg-rose-500', desc: '透過關卡挑戰提升數位邏輯判斷能力。' },
                { id: 'sim', title: '數位模擬', icon: 'cpu', color: 'bg-emerald-500', desc: '即時視覺化各種邏輯閘的真值表運算。' },
                { id: 'external_canvas', title: '專題畫布', icon: 'layout', color: 'bg-teal-500', desc: '搭載 MNA 求解器的專業級電路繪製環境。 (外部連結)' },
            ];
            return (
                <div className="h-full overflow-y-auto p-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 content-start custom-scrollbar">
                    {menu.map(m => (
                        <div key={m.id} onClick={() => setView(m.id)} className="group bg-slate-900 border border-white/5 rounded-[2.5rem] p-8 flex flex-col justify-between cursor-pointer hover:border-white/20 hover:bg-slate-800/50 transition-all">
                            <div>
                                <div className={`${m.color} w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg shadow-${m.color.split('-')[1]}-500/20 group-hover:scale-110 transition-transform`}><LucideIcon name={m.icon} size={28} /></div>
                                <h3 className="mt-12 text-xl font-black text-white">{m.title}</h3>
                                <p className="mt-3 text-slate-400 text-xs leading-relaxed">{m.desc}</p>
                            </div>
                            <div className="mt-10 text-[10px] font-black text-teal-400 flex items-center gap-2 uppercase tracking-widest group-hover:translate-x-2 transition-transform">
                                {m.id === 'external_canvas' ? 'Open URL' : 'Initialize'} <LucideIcon name={m.id === 'external_canvas' ? 'external-link' : 'arrow-right'} size={12}/>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        // --- 功能 1: 元件百科 (含頁碼) ---
        const PartsView = ({ onBack, user }) => {
            const [idx, setIdx] = useState(0);
            const [note, setNote] = useState("");
            const curr = PARTS_DATA[idx];

            useEffect(() => { setNote(localStorage.getItem(`note_${user.email}_${idx}`) || ""); }, [idx, user.email]);
            const save = (v) => { setNote(v); localStorage.setItem(`note_${user.email}_${idx}`, v); };

            useEffect(() => {
                const handleKey = (e) => {
                    if (e.key === 'ArrowLeft') setIdx(prev => (prev - 1 + PARTS_DATA.length) % PARTS_DATA.length);
                    if (e.key === 'ArrowRight') setIdx(prev => (prev + 1) % PARTS_DATA.length);
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, []);

            return (
                <div className="h-full flex flex-col p-8 overflow-y-auto custom-scrollbar">
                    <button onClick={onBack} className="text-slate-500 font-black text-[10px] uppercase mb-8 hover:text-white transition-colors flex items-center gap-2"><LucideIcon name="chevron-left" size={14}/> Back to Hub</button>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 flex-1 items-start">
                        <div className="bg-slate-900 rounded-[2.5rem] p-10 border border-white/5 flex flex-col shadow-2xl min-h-[550px] relative overflow-hidden">
                            <div className="flex justify-between items-center mb-6">
                                <div className="px-4 py-1.5 bg-slate-950 border border-white/5 rounded-full text-[10px] font-black text-teal-500 uppercase tracking-widest">
                                    Component {String(idx + 1).padStart(2, '0')} / {String(PARTS_DATA.length).padStart(2, '0')}
                                </div>
                                <div className="text-[10px] text-slate-600 font-bold uppercase">Library Access</div>
                            </div>

                            <h2 className="text-4xl font-black text-white leading-tight">{curr.name}</h2>
                            <p className="text-teal-400 text-xs font-black uppercase mt-1 tracking-widest">{curr.en}</p>
                            
                            <div className="mt-10 space-y-8">
                                <div><h4 className="text-slate-600 text-[10px] font-black uppercase mb-3 tracking-tighter">元件描述</h4><p className="text-slate-300 text-sm leading-relaxed">{curr.desc}</p></div>
                                <div><h4 className="text-slate-600 text-[10px] font-black uppercase mb-3 tracking-tighter">實際應用</h4><p className="text-slate-300 text-sm leading-relaxed">{curr.usage}</p></div>
                                <div><h4 className="text-slate-600 text-[10px] font-black uppercase mb-3 tracking-tighter">實驗筆記區 (Auto-save)</h4><textarea className="w-full bg-slate-950 p-5 rounded-2xl h-32 resize-none outline-none text-sm border border-white/5 focus:border-teal-500/50 transition-colors" value={note} onChange={e => save(e.target.value)} placeholder="在此記錄您的實驗發現..." /></div>
                            </div>
                        </div>
                        <div className="flex flex-col gap-6 sticky top-0">
                            <div className="bg-slate-900 rounded-[2.5rem] p-12 border border-white/5 flex flex-col items-center justify-center text-center shadow-xl">
                                <div onClick={() => window.open(`https://www.google.com/search?q=${curr.name}&tbm=isch`)} className="w-64 h-64 bg-slate-950 rounded-3xl border-2 border-dashed border-white/10 flex flex-col items-center justify-center cursor-pointer hover:border-teal-500 group transition-all">
                                    <LucideIcon name="image" size={48} className="text-slate-800 group-hover:text-teal-500 transition-colors"/>
                                    <span className="mt-4 text-[10px] font-black text-slate-600 uppercase group-hover:text-teal-400">Search for Images</span>
                                </div>
                                <button onClick={() => window.open(`https://zh.wikipedia.org/wiki/${curr.name}`)} className="mt-10 w-full py-4 bg-slate-800 hover:bg-slate-700 text-white rounded-2xl font-black text-xs uppercase flex items-center justify-center gap-3 transition-colors shadow-lg"><LucideIcon name="external-link" size={16}/> Wikipedia Lookup</button>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={() => setIdx(p => (p - 1 + PARTS_DATA.length) % PARTS_DATA.length)} className="py-5 bg-slate-900 border border-white/5 rounded-2xl text-xs font-black uppercase hover:bg-slate-800 transition-colors flex items-center justify-center gap-2">
                                    <LucideIcon name="arrow-left" size={14}/> Previous
                                </button>
                                <button onClick={() => setIdx(p => (p + 1) % PARTS_DATA.length)} className="py-5 bg-teal-500 text-slate-950 rounded-2xl text-xs font-black uppercase hover:bg-teal-400 transition-colors flex items-center justify-center gap-2">
                                    Next <LucideIcon name="arrow-right" size={14}/>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 功能 2: 邏輯闖關 ---
        const ChallengeView = ({ onBack }) => {
            const [diff, setDiff] = useState(null);
            const [q, setQ] = useState(null);
            const [result, setResult] = useState(null);
            const [showHint, setShowHint] = useState(false);
            const [score, setScore] = useState({ t: 0, c: 0 });

            const generate = (d) => {
                const gates = ['AND', 'OR', 'XOR', 'NAND', 'NOR'];
                const a = Math.round(Math.random()), b = Math.round(Math.random()), c = Math.round(Math.random());
                let text = "", ans = 0, hint = "";
                if (d === 'easy') {
                    const g = gates[Math.floor(Math.random() * gates.length)];
                    text = `${a} ${g} ${b}`; ans = GATE_DEFS[g].func(a, b);
                    hint = `【基礎提示】${GATE_DEFS[g].desc}`;
                } else if (d === 'normal') {
                    const g1 = gates[Math.floor(Math.random() * gates.length)], g2 = gates[Math.floor(Math.random() * gates.length)];
                    const inner = GATE_DEFS[g1].func(a, b);
                    text = `(${a} ${g1} ${b}) ${g2} ${c}`; ans = GATE_DEFS[g2].func(inner, c);
                    hint = `【中階提示】先算括號：${a} ${g1} ${b} = ${inner}`;
                } else {
                    const g1 = gates[Math.floor(Math.random() * gates.length)], g2 = gates[Math.floor(Math.random() * gates.length)], g3 = gates[Math.floor(Math.random() * gates.length)];
                    const d_val = Math.round(Math.random());
                    const r1 = GATE_DEFS[g1].func(a, b), r2 = GATE_DEFS[g2].func(r1, c);
                    text = `((${a} ${g1} ${b}) ${g2} ${c}) ${g3} ${d_val}`; ans = GATE_DEFS[g3].func(r2, d_val);
                    hint = `【高階提示】內層：${r1}，中層：${r2}`;
                }
                setQ({ text, ans, hint }); setResult(null); setShowHint(false);
            };

            const check = (v) => {
                if (result) return;
                const ok = v === q.ans;
                setScore({ t: score.t + 1, c: score.c + (ok ? 1 : 0) });
                setResult(ok ? 'SUCCESS' : `FAILED (Correct: ${q.ans})`);
            };

            if (!diff) return (
                <div className="h-full flex flex-col items-center justify-center p-8 bg-slate-950 overflow-y-auto custom-scrollbar">
                    <button onClick={onBack} className="absolute top-10 left-10 text-slate-500 font-black text-xs uppercase flex items-center gap-2 hover:text-white transition-colors z-20"><LucideIcon name="chevron-left" size={16}/> Quit Challenge</button>
                    <h2 className="text-4xl font-black mb-4 uppercase tracking-tighter text-white">Logic Challenger</h2>
                    <p className="text-slate-500 mb-12 text-sm">選擇難度並測試您的布林運算精準度</p>
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-8 w-full max-w-4xl">
                        {['easy', 'normal', 'hard'].map(d => (
                            <button key={d} onClick={() => { setDiff(d); generate(d); }} className="bg-slate-900 p-10 rounded-[3rem] border border-white/5 hover:border-teal-500 hover:bg-slate-800 transition-all text-center group shadow-2xl">
                                <div className="text-5xl mb-6 group-hover:scale-110 transition-transform">{d === 'easy' ? '🌱' : d === 'normal' ? '⚙️' : '🧠'}</div>
                                <h3 className="text-xl font-black uppercase text-white tracking-widest">{d}</h3>
                            </button>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="h-full flex flex-col bg-slate-950 relative">
                    <div className="flex justify-between items-center p-6 border-b border-white/5 bg-slate-900/50 backdrop-blur-md z-30">
                        <button onClick={() => setDiff(null)} className="text-slate-500 font-black text-xs uppercase flex items-center gap-2 hover:text-white transition-colors"><LucideIcon name="chevron-left" size={14}/> Change Difficulty</button>
                        <div className="bg-slate-900 px-6 py-2 rounded-2xl text-[10px] font-black text-teal-400 border border-white/5 tracking-widest uppercase shadow-md">Success Rate: {score.t === 0 ? 0 : Math.round((score.c/score.t)*100)}%</div>
                    </div>
                    <div className="flex-1 overflow-y-auto custom-scrollbar p-6 flex flex-col items-center">
                        <div className="w-full max-w-2xl bg-slate-900 p-12 rounded-[3.5rem] border border-white/5 relative shadow-2xl mt-4 mb-8">
                            <div className="text-3xl md:text-5xl font-black text-center mb-12 text-white font-mono break-words leading-tight bg-slate-950/30 p-8 rounded-3xl border border-white/5">
                                {q?.text} = <span className="text-teal-400 animate-pulse">?</span>
                            </div>
                            {!result ? (
                                <div className="grid grid-cols-2 gap-6">
                                    <button onClick={() => check(0)} className="py-8 bg-slate-800 rounded-3xl text-5xl font-black hover:bg-slate-700 active:scale-95 transition-all">0</button>
                                    <button onClick={() => check(1)} className="py-8 bg-teal-500 text-slate-950 rounded-3xl text-5xl font-black hover:bg-teal-400 active:scale-95 transition-all">1</button>
                                </div>
                            ) : (
                                <div className="text-center animate-in zoom-in duration-300">
                                    <div className={`text-3xl font-black mb-8 flex items-center justify-center gap-3 ${result.startsWith('SUCCESS') ? 'text-teal-400' : 'text-rose-400'}`}>{result}</div>
                                    <button onClick={() => generate(diff)} className="px-14 py-4 bg-teal-500 text-slate-950 rounded-2xl font-black text-xs uppercase shadow-lg hover:bg-teal-400 transition-colors">Continue Challenge</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- 功能 3: 數位模擬器 ---
        const SimulatorView = ({ onBack }) => {
            const [state, setState] = useState({ a: 0, b: 0, g: 'AND' });
            const out = useMemo(() => (state.g === 'NOT' ? GATE_DEFS.NOT.func(state.a) : GATE_DEFS[state.g].func(state.a, state.b)), [state]);
            return (
                <div className="h-full flex flex-col p-8 overflow-y-auto custom-scrollbar bg-slate-950">
                    <button onClick={onBack} className="text-slate-500 font-black text-[10px] uppercase mb-8 hover:text-white transition-colors flex items-center gap-2"><LucideIcon name="chevron-left" size={14}/> Dashboard</button>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
                        <div className="bg-slate-900 p-10 rounded-[2.5rem] border border-white/5 space-y-10 shadow-2xl">
                            <h3 className="text-[10px] font-black uppercase text-slate-600 tracking-widest">Input Signals</h3>
                            <div className="flex gap-4">
                                <button onClick={() => setState({...state, a: state.a^1})} className={`flex-1 py-12 rounded-3xl font-black text-4xl transition-all shadow-lg ${state.a ? 'bg-teal-500 text-slate-950 shadow-teal-500/20' : 'bg-slate-800 text-slate-500'}`}>A: {state.a}</button>
                                <button onClick={() => setState({...state, b: state.b^1})} className={`flex-1 py-12 rounded-3xl font-black text-4xl transition-all shadow-lg ${state.g==='NOT'?'opacity-10 pointer-events-none':''} ${state.b ? 'bg-teal-500 text-slate-950 shadow-teal-500/20' : 'bg-slate-800 text-slate-500'}`}>B: {state.b}</button>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                {Object.keys(GATE_DEFS).map(g => (
                                    <button key={g} onClick={() => setState({...state, g})} className={`py-4 rounded-xl text-xs font-black transition-all border ${state.g === g ? 'bg-teal-500/10 border-teal-500 text-teal-400' : 'bg-slate-950 border-white/5 text-slate-500 hover:border-white/10'}`}>{g}</button>
                                ))}
                            </div>
                        </div>
                        <div className="lg:col-span-2 bg-slate-900 rounded-[2.5rem] border border-white/5 flex flex-col items-center justify-center p-16 shadow-2xl relative">
                            <div className={`w-36 h-36 rounded-full flex items-center justify-center mb-12 transition-all duration-500 ${out ? 'bg-amber-400 shadow-[0_0_100px_rgba(251,191,36,0.4)]' : 'bg-slate-950 shadow-inner'}`}>
                                <LucideIcon name="lightbulb" size={72} className={out ? 'text-slate-900' : 'text-slate-800'} />
                            </div>
                            <p className={`text-[10rem] font-black leading-none transition-colors duration-500 ${out ? 'text-amber-400' : 'text-slate-950'}`}>{out}</p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
