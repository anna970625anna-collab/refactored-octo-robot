<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogicLab 學習中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #F8F9FC;
            overflow-x: hidden;
        }
        .card-shadow {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card-shadow:hover {
            transform: translateY(-12px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
        }
        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <!-- 背景裝飾圓形 -->
    <div class="fixed top-[-10%] left-[-5%] w-[500px] h-[500px] bg-blue-100/40 rounded-full blur-[100px] -z-10"></div>
    <div class="fixed bottom-[-10%] right-[-5%] w-[500px] h-[500px] bg-orange-100/40 rounded-full blur-[100px] -z-10"></div>

    <!-- 標題區域 -->
    <header class="text-center mb-16 fade-in-up">
        <h1 class="text-5xl md:text-6xl font-bold text-slate-800 mb-4">
            LogicLab 學習中心
        </h1>
        <p class="text-xl text-slate-400 font-medium">
            電子電路分頁百科與數據模擬實驗室
        </p>
    </header>

    <!-- 核心功能卡片網格 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 max-w-7xl w-full">
        
        <!-- 零件百科 -->
        <div class="bg-white p-10 rounded-[45px] card-shadow flex flex-col items-center text-center fade-in-up delay-1">
            <div class="w-20 h-20 rounded-2xl bg-blue-600 flex items-center justify-center text-white mb-8 shadow-lg shadow-blue-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
            </div>
            <h3 class="text-2xl font-bold text-slate-800 mb-3">零件百科</h3>
            <p class="text-slate-400 text-sm leading-relaxed">
                零件導覽、維基連結與繪圖<br>筆記
            </p>
        </div>

        <!-- LogicLab v2.0 -->
        <div class="bg-white p-10 rounded-[45px] card-shadow flex flex-col items-center text-center fade-in-up delay-2">
            <div class="w-20 h-20 rounded-2xl bg-sky-400 flex items-center justify-center text-white mb-8 shadow-lg shadow-sky-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M14 3v4"/><path d="M8 3v4"/><path d="M14 17v4"/><path d="M8 17v4"/><path d="M3 14h4"/><path d="M3 8h4"/><path d="M17 14h4"/><path d="M17 8h4"/><path d="M8 12h8"/></svg>
            </div>
            <h3 class="text-2xl font-bold text-slate-800 mb-3">LogicLab v2.0</h3>
            <p class="text-slate-400 text-sm leading-relaxed">
                數位邏輯驗證與數據導出
            </p>
        </div>

        <!-- 邏輯挑戰島 -->
        <div class="bg-white p-10 rounded-[45px] card-shadow flex flex-col items-center text-center fade-in-up delay-3">
            <div class="w-20 h-20 rounded-2xl bg-emerald-500 flex items-center justify-center text-white mb-8 shadow-lg shadow-emerald-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            </div>
            <h3 class="text-2xl font-bold text-slate-800 mb-3">邏輯挑戰島</h3>
            <p class="text-slate-400 text-sm leading-relaxed">
                具備層次難度與智慧提示
            </p>
        </div>

        <!-- 阿新電路實作 -->
        <div class="bg-white p-10 rounded-[45px] card-shadow flex flex-col items-center text-center fade-in-up delay-4">
            <div class="w-20 h-20 rounded-2xl bg-orange-500 flex items-center justify-center text-white mb-8 shadow-lg shadow-orange-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 7h10v10H7z"/><path d="M12 3v4"/><path d="M12 17v4"/><path d="M3 12h4"/><path d="M17 12h4"/></svg>
            </div>
            <h3 class="text-2xl font-bold text-slate-800 mb-3">阿新電路實作</h3>
            <p class="text-slate-400 text-sm leading-relaxed">
                數位零件組裝與物理模擬
            </p>
        </div>

    </div>

    <!-- 右下角懸浮按鈕裝飾 -->
    <div class="fixed bottom-8 right-8 w-14 h-14 bg-white rounded-2xl shadow-xl border border-slate-50 flex items-center justify-center cursor-pointer hover:bg-slate-50 transition-all active:scale-90">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
    </div>

</body>
</html>
